<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Bon retour</h1>
      <p>Connectez-vous à votre compte</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div *ngIf="error" class="alert alert-error">
        {{ error }}
      </div>

      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          placeholder="Entrez votre e-mail"
          [class.is-invalid]="submitted && f['email'].errors"
        >
        <div *ngIf="submitted && f['email'].errors" class="error-message">
          <span *ngIf="f['email'].errors['required']">L'e-mail est requis</span>
          <span *ngIf="f['email'].errors['email']">Format e-mail invalide</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          placeholder="Entrez votre mot de passe"
          [class.is-invalid]="submitted && f['password'].errors"
        >
        <div *ngIf="submitted && f['password'].errors" class="error-message">
          <span *ngIf="f['password'].errors['required']">Le mot de passe est requis</span>
          <span *ngIf="f['password'].errors['minlength']">Au moins 6 caractères</span>
        </div>
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="loading"
      >
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <div class="login-footer">
      <p>Pas encore de compte ? <a routerLink="/signup">Inscrivez-vous</a></p>
    </div>
  </div>
</div>
