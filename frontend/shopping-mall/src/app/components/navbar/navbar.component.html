<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-left">
      <div class="brand-link" aria-label="Shopping Mall">
        <span class="brand-icon">🛍️</span>
        <span class="brand-text">Shopping Mall</span>
      </div>
    </div>

    <div class="navbar-center">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link nav-main">Accueil</a>
      <a routerLink="/products" routerLinkActive="active" class="nav-link nav-main">Produits</a>
      <a routerLink="/profile" routerLinkActive="active" class="nav-link nav-main">Profil</a>
    </div>

    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="navbar-menu" [class.active]="isMenuOpen">
      <div class="mobile-main-links">
        <a routerLink="/" (click)="isMenuOpen = false" class="nav-link">Accueil</a>
        <a routerLink="/products" (click)="isMenuOpen = false" class="nav-link">Produits</a>
        <a routerLink="/profile" (click)="isMenuOpen = false" class="nav-link">Profil</a>
      </div>
      <div class="navbar-end">
        <ng-container *ngIf="!currentUser">
          <a routerLink="/login" routerLinkActive="active" class="nav-link">
            Connexion
          </a>
          <a routerLink="/signup" routerLinkActive="active" class="nav-link btn-signup">
            S'inscrire
          </a>
        </ng-container>

        <ng-container *ngIf="currentUser">
          <div class="user-menu">
            <span class="user-name">{{ currentUser.name }}</span>
            <span class="user-role" [ngClass]="'role-' + currentUser.role">{{ currentUser.role }}</span>
          </div>

          <div class="nav-dropdown">
            <button class="nav-link dropdown-toggle" aria-label="Ouvrir le menu utilisateur">☰</button>
            <div class="dropdown-menu">
              <a *ngIf="isAdmin()" routerLink="/admin/dashboard" class="dropdown-item">
                Tableau de bord Admin
              </a>
              <a *ngIf="isAdmin()" routerLink="/admin/users" class="dropdown-item">
                Gérer les utilisateurs
              </a>
              <a *ngIf="isBoutique()" routerLink="/boutique/dashboard" class="dropdown-item">
                Tableau de bord Boutique
              </a>
              <a *ngIf="isBoutique()" routerLink="/boutique/products" class="dropdown-item">
                Mes produits
              </a>
              <a *ngIf="isAcheteur()" routerLink="/buyer/orders" class="dropdown-item">
                Mes commandes
              </a>
              <hr class="dropdown-divider">
              <button (click)="logout()" class="dropdown-item logout">
                Déconnexion
              </button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
