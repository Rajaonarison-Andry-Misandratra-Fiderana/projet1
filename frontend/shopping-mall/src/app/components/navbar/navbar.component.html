<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <a routerLink="/" class="brand-link">
        <span class="brand-icon">🛍️</span>
      </a>
    </div>

    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="navbar-menu" [class.active]="isMenuOpen">
      <!-- Section navbar-start vide -->
      <div class="navbar-start"></div>

      <div class="navbar-center">
        <input class="nav-search" type="search" placeholder="Rechercher des produits..." (focus)="goToProducts()" />
      </div>

      <div class="navbar-end">
        <ng-container *ngIf="!currentUser">
          <a routerLink="/login" routerLinkActive="active" class="nav-link">
            Connexion
          </a>
          <a routerLink="/signup" routerLinkActive="active" class="nav-link btn-signup">
            S'inscrire
          </a>
        </ng-container>

        <ng-container *ngIf="currentUser">
          <div class="user-menu">
            <span class="user-name">{{ currentUser.name }}</span>
            <span class="user-role" [ngClass]="'role-' + currentUser.role">{{ currentUser.role }}</span>
          </div>

          <div class="nav-dropdown">
            <button class="nav-link dropdown-toggle">
              {{ currentUser.role === 'admin' ? '⚙️ Admin' : currentUser.role === 'boutique' ? '🏪 Boutique' : '🛒
              Menu' }}
            </button>
            <div class="dropdown-menu">
              <a *ngIf="isAdmin()" routerLink="/admin/dashboard" class="dropdown-item">
                Tableau de bord Admin
              </a>
              <a *ngIf="isAdmin()" routerLink="/admin/users" class="dropdown-item">
                Gérer les utilisateurs
              </a>
              <a *ngIf="isBoutique()" routerLink="/boutique/dashboard" class="dropdown-item">
                Tableau de bord Boutique
              </a>
              <a *ngIf="isBoutique()" routerLink="/boutique/products" class="dropdown-item">
                Mes produits
              </a>
              <a *ngIf="isAcheteur()" routerLink="/buyer/orders" class="dropdown-item">
                Mes commandes
              </a>
              <a routerLink="/profile" class="dropdown-item">
                Profil
              </a>
              <hr class="dropdown-divider">
              <button (click)="logout()" class="dropdown-item logout">
                Déconnexion
              </button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
